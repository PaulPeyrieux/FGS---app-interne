services:
  - type: web
    name: fgs-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fgs-db
          property: connectionString
      - key: COMPTES
        sync: false

databases:
  - name: fgs-db
    plan: free
    databaseName: fgsapp
    user: fgsapp
